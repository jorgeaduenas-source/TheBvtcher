<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Bvtcher</title>
  <meta name="description" content="The official landing page for The Bvtcher." />

  <meta property="og:title" content="The Bvtcher" />
  <meta property="og:description" content="The official landing page for The Bvtcher." />
  <meta property="og:image" content="bvtcher-web-hero.png" />
  <meta property="og:type" content="website" />

  <style>
    :root {
      --icon-size-desktop: 82px;
      --icon-size-mobile: 58px;

      /* DESKTOP HOTSPOT POSITIONS */
      --facebook-left-desktop: 17.5%;
      --facebook-top-desktop: 50%;

      --instagram-left-desktop: 82.5%;
      --instagram-top-desktop: 50%;

      /* MOBILE HOTSPOT POSITIONS */
      --facebook-left-mobile: 13.5%;
      --facebook-top-mobile: 42%;

      --instagram-left-mobile: 86.5%;
      --instagram-top-mobile: 42%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      opacity: 0;
      animation: pageFade 500ms ease forwards;
    }

    @keyframes pageFade {
      to { opacity: 1; }
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    picture,
    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-img {
      object-fit: contain;
      object-position: center center;
      user-select: none;
      pointer-events: none;
    }

    .social-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .social-button {
      position: absolute;
      width: var(--icon-size-desktop);
      height: var(--icon-size-desktop);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      text-decoration: none;
      color: #fff;
      background:
        radial-gradient(circle, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.08) 37%, rgba(0,0,0,0.88) 68%),
        #000;
      border: 2px solid rgba(255,255,255,0.86);
      box-shadow:
        0 0 12px rgba(255,255,255,0.56),
        0 0 30px rgba(255,255,255,0.28),
        0 0 54px rgba(255,255,255,0.16);
      opacity: 0;
      pointer-events: auto;
      transition: opacity 260ms ease, transform 260ms ease, filter 260ms ease;
    }

    .social-button::before,
    .social-button::after {
      content: "";
      position: absolute;
      pointer-events: none;
      opacity: 0.72;
    }

    .social-button::before {
      width: 165%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
      filter: blur(0.35px);
    }

    .social-button::after {
      width: 2px;
      height: 165%;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.9), transparent);
      filter: blur(0.35px);
    }

    .social-button svg {
      width: 48%;
      height: 48%;
      fill: currentColor;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.55));
    }

    .stage:hover .social-button,
    .stage.is-active .social-button,
    .social-button:focus-visible {
      opacity: 1;
    }

    .social-button:hover,
    .social-button:focus-visible {
      transform: translate(-50%, -50%) scale(1.08);
      filter: brightness(1.18);
      outline: none;
    }

    .facebook {
      left: var(--facebook-left-desktop);
      top: var(--facebook-top-desktop);
    }

    .instagram {
      left: var(--instagram-left-desktop);
      top: var(--instagram-top-desktop);
    }

    .countdown {
      position: absolute;
      left: 50%;
      bottom: 5.5%;
      transform: translateX(-50%);
      z-index: 6;
      display: none;
      color: rgba(255,255,255,0.9);
      text-align: center;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 13px;
      line-height: 1.5;
      text-shadow: 0 0 10px rgba(255,255,255,0.35);
      pointer-events: none;
    }

    .countdown.is-visible {
      display: block;
    }

    .countdown strong {
      display: block;
      font-size: 18px;
      letter-spacing: 0.18em;
      margin-bottom: 4px;
    }

    @media (max-width: 768px), (pointer: coarse) {
      .social-button {
        width: var(--icon-size-mobile);
        height: var(--icon-size-mobile);
        opacity: 1;
      }

      .facebook {
        left: var(--facebook-left-mobile);
        top: var(--facebook-top-mobile);
      }

      .instagram {
        left: var(--instagram-left-mobile);
        top: var(--instagram-top-mobile);
      }

      .social-button::before {
        width: 145%;
      }

      .social-button::after {
        height: 145%;
      }

      .countdown {
        bottom: 4%;
        font-size: 11px;
      }

      .countdown strong {
        font-size: 15px;
      }
    }
  </style>

  <script data-goatcounter="https://thebvtcherband.goatcounter.com/count"
          async src="https://gc.zgo.at/count.js"></script>
</head>

<body>
  <main class="stage" id="stage" aria-label="The Bvtcher official landing page">
    <picture>
      <source media="(max-width: 768px)" srcset="bvtcher-mobile-hero.png" />
      <img class="hero-img" src="bvtcher-web-hero.png" alt="The Bvtcher" />
    </picture>

    <nav class="social-layer" aria-label="The Bvtcher social links">
      <a
        class="social-button facebook"
        href="https://www.facebook.com/TheBvtcherBand/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="The Bvtcher on Facebook"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14.02 8.3V6.62c0-.8.18-1.22 1.34-1.22h1.63V2.12C16.19 2.04 15.55 2 14.6 2c-3.12 0-5.15 1.9-5.15 5.35V8.3H6.03v3.7h3.42v10h4.05V12h3.38l.51-3.7h-3.37z"/>
        </svg>
      </a>

      <a
        class="social-button instagram"
        href="https://www.instagram.com/TheBvtcherBand/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="The Bvtcher on Instagram"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5zm4.25 3.25A4.75 4.75 0 1 1 7.25 12 4.75 4.75 0 0 1 12 7.25zm0 2A2.75 2.75 0 1 0 14.75 12 2.75 2.75 0 0 0 12 9.25zm5.05-2.55a1.15 1.15 0 1 1-1.15 1.15 1.15 1.15 0 0 1 1.15-1.15z"/>
        </svg>
      </a>
    </nav>

    <section class="countdown" id="countdown" aria-label="Countdown timer">
      <strong id="countdown-title">Upcoming Event</strong>
      <span id="countdown-time"></span>
    </section>
  </main>

  <script>
    const stage = document.getElementById("stage");

    let activeTimer;
    const activateLinks = () => {
      stage.classList.add("is-active");
      clearTimeout(activeTimer);
      activeTimer = setTimeout(() => {
        stage.classList.remove("is-active");
      }, 2400);
    };

    window.addEventListener("mousemove", activateLinks, { passive: true });
    window.addEventListener("touchstart", activateLinks, { passive: true });

    /*
      COUNTDOWN SETUP

      To activate later:
      1. Change ENABLE_COUNTDOWN to true
      2. Set EVENT_TITLE
      3. Set EVENT_DATE

      Date format:
      "2026-10-10T20:00:00-05:00"
    */
    const ENABLE_COUNTDOWN = false;
    const EVENT_TITLE = "Upcoming Event";
    const EVENT_DATE = "2026-10-10T20:00:00-05:00";

    const countdown = document.getElementById("countdown");
    const countdownTitle = document.getElementById("countdown-title");
    const countdownTime = document.getElementById("countdown-time");

    function updateCountdown() {
      const now = new Date().getTime();
      const target = new Date(EVENT_DATE).getTime();
      const distance = target - now;

      if (distance <= 0) {
        countdownTime.textContent = "Now";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      countdownTime.textContent =
        days + "D " + hours + "H " + minutes + "M " + seconds + "S";
    }

    if (ENABLE_COUNTDOWN) {
      countdown.classList.add("is-visible");
      countdownTitle.textContent = EVENT_TITLE;
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }
  </script>
</body>
</html>
